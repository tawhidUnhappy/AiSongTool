name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: Build - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-22.04
          - platform: macos
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install uv

      - name: Set version
        shell: bash
        run: |
          echo "AISONGTOOL_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Sanity check package
        run: |
          uv run python -m compileall -q aisongtool
          uv run aisongtool --version

      - name: Build standalone app
        run: uv run pyinstaller packaging/aisongtool.spec --distpath dist --workpath build-tmp --noconfirm --clean

      - name: Install Inno Setup
        if: matrix.platform == 'windows'
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Create Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=$env:AISONGTOOL_VERSION" "packaging\aisongtool.iss"

      - name: Package Windows portable
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Compress-Archive -Path "dist\AiSongTool\*" -DestinationPath "release-assets\AiSongTool-windows.zip" -Force
          Copy-Item "dist\AiSongTool-Setup-$env:AISONGTOOL_VERSION.exe" "release-assets\"

      - name: Package Linux portable
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          mkdir -p release-assets
          tar -C dist -czf "release-assets/AiSongTool-linux.tar.gz" AiSongTool

      - name: Package macOS portable
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p release-assets
          if [ -d "dist/AiSongTool.app" ]; then
            tar -C dist -czf "release-assets/AiSongTool-macos.tar.gz" AiSongTool.app
          else
            tar -C dist -czf "release-assets/AiSongTool-macos.tar.gz" AiSongTool
          fi

      - name: Upload build assets
        uses: actions/upload-artifact@v4
        with:
          name: aisongtool-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AiSongTool ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/**/*
          body: |
            ## AiSongTool ${{ github.ref_name }}

            Python + uv build. No Rust/Tauri wrapper is used.

            On first launch, open the **Setup** tab and click "Run setup" to provision the
            Demucs/WhisperX environments (requires `uv` on PATH and an internet connection —
            downloads several GB of models/CUDA wheels). `ffmpeg` on PATH is also required
            for the "Make Video" tab.

            ### Downloads

            #### Windows
            - `AiSongTool-Setup-*.exe` - installer
            - `AiSongTool-windows.zip` - portable folder

            #### Linux
            - `AiSongTool-linux.tar.gz` - portable folder

            #### macOS
            - `AiSongTool-macos.tar.gz` - portable app/folder

            Double-click the app or run `aisongtool app` to open it.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
