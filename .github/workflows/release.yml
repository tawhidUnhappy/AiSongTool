name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: win
            os: windows-latest
          - platform: linux
            os: ubuntu-22.04
          - platform: mac
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Install Linux build dependencies (AppImage/deb tooling)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rpm

      # The Electron app's `aisongtool/`/`workers/`/`font/` resources, and
      # everything those need at runtime (uv, the isolated ML envs/models),
      # are NOT bundled here — only the app shell + bundled static ffmpeg
      # ship in the installer (see electron-builder.yml's extraResources and
      # paths.ts's bootstrap.ts). Models/envs install on first run from the
      # Setup view, straight from HF/PyPI into the app's one self-contained
      # data root, exactly like a local dev run already does.
      # `-- --publish never`: this job only builds artifacts and uploads them
      # to the workflow run (see the next step) — the separate `release` job
      # below is the one and only place that publishes to a GitHub Release,
      # so electron-builder's own (config-implied, since electron-builder.yml
      # sets `publish: provider: github`) auto-publish must stay off here to
      # avoid two competing uploads of the same tag.
      - name: Build installers (${{ matrix.platform }})
        working-directory: desktop
        run: npm run build:${{ matrix.platform }} -- --publish never

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          find desktop/dist -maxdepth 1 -type f \
            \( -name '*.exe' -o -name '*.dmg' -o -name '*.zip' -o -name '*.AppImage' -o -name '*.deb' \) \
            -exec cp {} release-assets/ \;

      - name: Upload build assets
        uses: actions/upload-artifact@v4
        with:
          name: aisongtool-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AiSongTool ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/**/*
          body: |
            ## AiSongTool ${{ github.ref_name }}

            Electron desktop app. On first launch, open the **Setup** tab — it provisions
            everything else (the main environment, Demucs/WhisperX/Z-Image/Gemma/ACE-Step-1.5,
            and any models you select) automatically into one self-contained app-data folder
            (shown at the top of the Setup tab). Requires an internet connection for that first
            run; `uv` and `git` are required and not auto-installed. ffmpeg/ffprobe are bundled —
            no separate install needed.

            Deleting that one app-data folder (or uninstalling, on Windows/Linux) removes
            everything this app has ever written — no caches or models left anywhere else.

            ### Downloads

            #### Windows
            - `*-setup.exe` — installer (Start Menu shortcut, clean uninstall)
            - `*-portable.exe` — run from anywhere, no install

            #### macOS
            - `*.dmg` — drag-to-Applications install (includes an Uninstall helper)
            - `*.zip` — portable `.app`, run from anywhere

            #### Linux
            - `*.AppImage` — portable, run from anywhere
            - `*.deb` — system install (`apt install ./*.deb`)

            Unsigned builds: Windows SmartScreen / macOS Gatekeeper will warn on first launch
            (no paid code-signing certificate for this release) — this is expected.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
