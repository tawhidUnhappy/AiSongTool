name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: Build - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-22.04
          - platform: macos
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install uv

      - name: Set version
        shell: bash
        run: |
          echo "AISONGTOOL_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Sync dependencies
        run: uv sync

      - name: Sanity check package
        run: |
          uv run python -m compileall -q aisongtool
          uv run aisongtool --version

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libmpv-dev

      - name: Build standalone app
        run: uv run flet build ${{ matrix.platform }} --build-version "$AISONGTOOL_VERSION" --yes -v
        shell: bash

      - name: Package Windows portable
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Compress-Archive -Path "dist\windows\*" -DestinationPath "release-assets\AiSongTool-windows.zip" -Force

      - name: Package Linux portable
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          mkdir -p release-assets
          tar -C dist/linux -czf "release-assets/AiSongTool-linux.tar.gz" .

      - name: Package macOS portable
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p release-assets
          tar -C dist/macos -czf "release-assets/AiSongTool-macos.tar.gz" .

      - name: Upload build assets
        uses: actions/upload-artifact@v4
        with:
          name: aisongtool-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AiSongTool ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/**/*
          body: |
            ## AiSongTool ${{ github.ref_name }}

            Python + uv + Flet (Material 3 UI) build. No Rust/Tauri wrapper is used.

            On first launch, open the **Setup** tab and click "Run setup" to provision the
            Demucs/WhisperX environments (requires `uv` on PATH and an internet connection —
            downloads several GB of models/CUDA wheels). `ffmpeg` on PATH is also required
            for the "Make Video" tab.

            ### Downloads

            #### Windows
            - `AiSongTool-windows.zip` - portable folder, run `AiSongTool.exe`

            #### Linux
            - `AiSongTool-linux.tar.gz` - portable folder, run `./aisongtool` (or the bundled binary)

            #### macOS
            - `AiSongTool-macos.tar.gz` - portable `.app` bundle

            Or, with `uv` + `git`: `uv tool install --editable .` then `aisongtool app`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
